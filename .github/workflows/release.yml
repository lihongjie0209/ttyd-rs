name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            bin: ttyd
          - os: macos-latest
            platform: macos-x64
            bin: ttyd
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build release
        run: cargo build --release

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.bin }} dist/
          tar -C dist -czf ttyd-${{ matrix.platform }}.tar.gz ${{ matrix.bin }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ttyd-${{ matrix.platform }}
          path: ttyd-${{ matrix.platform }}.tar.gz

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ttyd-${{ matrix.platform }}.tar.gz
