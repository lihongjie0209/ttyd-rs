<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ttyd - Terminal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
        #app { width: 100%; height: 100%; display: flex; }
        #file-pane {
            width: 280px; min-width: 220px; max-width: 40%;
            border-right: 1px solid #333; background: #171717; color: #ddd;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            display: flex; flex-direction: column;
        }
        #file-toolbar {
            display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; border-bottom: 1px solid #2b2b2b;
        }
        #file-toolbar button {
            border: 1px solid #3b3b3b; background: #222; color: #ddd;
            border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 12px;
        }
        #file-toolbar button:hover { background: #2f2f2f; }
        #file-tree { list-style: none; padding: 8px; margin: 0; overflow: auto; flex: 1; font-size: 13px; }
        #file-tree li { padding: 3px 6px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #file-tree li:hover { background: #262626; }
        #file-tree li.selected { background: #004e8c; color: #fff; }
        #terminal-pane { flex: 1; min-width: 0; height: 100%; }
        #terminal { width: 100%; height: 100%; padding: 4px; }
        .xterm { height: 100%; }
        #overlay {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7);
            color: #fff; font-family: monospace; font-size: 14px;
            z-index: 100;
        }
        #overlay.hidden { display: none; }
        #overlay-box {
            background: #2b2b2b; border: 1px solid #444;
            padding: 24px 32px; border-radius: 6px; text-align: center;
        }
        #overlay-box h2 { margin-bottom: 12px; font-size: 16px; }
        #overlay-box p { color: #aaa; font-size: 13px; }
        #reconnect-btn {
            margin-top: 16px; padding: 8px 20px;
            background: #0078d4; color: #fff; border: none;
            border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        #reconnect-btn:hover { background: #005fa3; }
    </style>
</head>
<body>
    <div id="app">
        <aside id="file-pane">
            <div id="file-toolbar">
                <button id="file-refresh-btn">刷新</button>
                <button id="file-new-file-btn">新建文件</button>
                <button id="file-new-dir-btn">新建文件夹</button>
                <button id="file-rename-btn">重命名</button>
                <button id="file-delete-btn">删除</button>
            </div>
            <ul id="file-tree"></ul>
        </aside>
        <div id="terminal-pane">
            <div id="terminal"></div>
        </div>
    </div>
    <div id="overlay">
        <div id="overlay-box">
            <h2 id="overlay-title">Connecting…</h2>
            <p id="overlay-msg">Please wait</p>
            <button id="reconnect-btn" style="display:none" onclick="location.reload()">Reconnect</button>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
